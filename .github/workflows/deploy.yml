name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        id: image
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.repository }}:${{ github.sha }}
            ghcr.io/${{ steps.image.outputs.repository }}:latest

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -eu
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export API_IMAGE="ghcr.io/${REPO}:latest"
            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/avtoshop_back"
            fi

            if ! mkdir -p "$APP_DIR"; then
              echo "No write access to $APP_DIR, fallback to $HOME/avtoshop_back"
              APP_DIR="$HOME/avtoshop_back"
              mkdir -p "$APP_DIR"
            fi
            cd "$APP_DIR"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            cat > .env <<EOF
            API_IMAGE=${API_IMAGE}
            APP_NAME=AvtoShop API
            API_PORT=5000
            DATABASE_URL=sqlite:////data/avtoshop.db
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM=HS256
            JWT_EXPIRES_MINUTES=120
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            SEED_SAMPLE_DATA=false
            EOF

            cat > docker-compose.prod.yml <<'EOF'
            services:
              api:
                image: ${API_IMAGE}
                container_name: avtoshop_api
                restart: unless-stopped
                ports:
                  - "5000:5000"
                env_file:
                  - .env
                volumes:
                  - avtoshop_data:/data
                command: uvicorn app.main:app --host 0.0.0.0 --port 5000
            volumes:
              avtoshop_data:
            EOF

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

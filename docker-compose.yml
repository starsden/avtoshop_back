services:
  api:
    build:
      context: .
    ports:
      - "5000:5000"
    environment:
      APP_NAME: "${APP_NAME:-AvtoShop API}"
      API_PORT: "${API_PORT:-5000}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/avtoshop.db}"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      JWT_EXPIRES_MINUTES: "${JWT_EXPIRES_MINUTES:-120}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@avtoshop.local}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-ChangeMe123!}"
      SEED_SAMPLE_DATA: "${SEED_SAMPLE_DATA:-true}"
    volumes:
      - .:/app
      - avtoshop_data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

volumes:
  avtoshop_data:
